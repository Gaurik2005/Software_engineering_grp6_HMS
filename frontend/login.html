<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
async function login(){
    try {
        const response = await fetch("http://localhost:8008/auth/login?email="+email.value+
        "&password="+password.value,{
            method:"POST",
            credentials:"include"
        });

        const data = await response.json();
        let role = data.role;
        let userId = data.userId;

        if (userId === null || userId === undefined) {
            const meResponse = await fetch("http://localhost:8008/auth/me", {
                credentials: "include"
            });
            const me = await meResponse.json();
            role = role ?? me.role;
            userId = me.userId;
        }

        localStorage.setItem("role", role);
        if (userId !== null && userId !== undefined) {
            localStorage.setItem("userId", userId);
        } else {
            localStorage.removeItem("userId");
        }

        if(role==="PATIENT")
            location.href="/patient/dashboard.html"

        if(role==="DOCTOR")
            location.href="/doctor/dashboard.html"

        if(role==="HEAD_NURSE" || role==="NURSE")
            location.href="/nurse/roster.html"

        if(role==="ADMIN")
            location.href="/admin/dashboard.html"
    } catch (err) {
        alert("Login failed");
    }
}
</script>

</body>
</html>
